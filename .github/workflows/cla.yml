name: CLA & DCO

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A personal access token with repo scope is required to write
          # signatures to the cla-signatures branch.
          # Add this as a repository secret named CLA_TOKEN.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          branch: cla-signatures
          path-to-document: https://github.com/<owner>/occt-rs/blob/main/CLA.md
          # bot* is excluded so automated commits don't trigger CLA checks.
          allowlist: bot*

  dco:
    name: DCO Sign-off
    runs-on: ubuntu-latest
    steps:
      - name: DCO Check
        uses: dcoapp/app@latest
        # Every commit in the PR must contain a Signed-off-by line matching
        # the commit author. Contributors add this with: git commit -s
